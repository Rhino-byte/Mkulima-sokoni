<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="api-base-url" content="" id="api-base-url-meta">
  <title>Sign In | Mkulima-Bora</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #e0f7ef 0%, #f5f7fa 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    
    .auth-container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
      padding: 2.5rem;
      width: 100%;
      max-width: 450px;
    }
    
    .logo {
      text-align: center;
      margin-bottom: 2rem;
    }
    
    .logo h1 {
      color: #27AE60;
      font-size: 1.75rem;
      margin-bottom: 0.5rem;
    }
    
    .logo p {
      color: #6b7280;
      font-size: 0.9rem;
    }
    
    .form-group {
      margin-bottom: 1.5rem;
    }
    
    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      color: #374151;
      font-weight: 500;
    }
    
    .form-group input {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      font-size: 1rem;
      transition: border-color 0.2s;
    }
    
    .form-group input:focus {
      outline: none;
      border-color: #27AE60;
    }
    
    .btn {
      width: 100%;
      padding: 0.75rem;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 1rem;
    }
    
    .btn-primary {
      background: #27AE60;
      color: white;
    }
    
    .btn-primary:hover {
      background: #229954;
    }
    
    .btn-google {
      background: white;
      color: #374151;
      border: 1px solid #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    
    .btn-google:hover {
      background: #f9fafb;
    }
    
    .divider {
      text-align: center;
      margin: 1.5rem 0;
      color: #9ca3af;
      position: relative;
    }
    
    .divider::before,
    .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 45%;
      height: 1px;
      background: #e5e7eb;
    }
    
    .divider::before {
      left: 0;
    }
    
    .divider::after {
      right: 0;
    }
    
    .error-message {
      background: #fee2e2;
      color: #991b1b;
      padding: 0.75rem;
      border-radius: 8px;
      margin-bottom: 1rem;
      font-size: 0.9rem;
      display: none;
    }
    
    .success-message {
      background: #d1fae5;
      color: #065f46;
      padding: 0.75rem;
      border-radius: 8px;
      margin-bottom: 1rem;
      font-size: 0.9rem;
      display: none;
    }
    
    .toggle-form {
      text-align: center;
      margin-top: 1.5rem;
      color: #6b7280;
    }
    
    .toggle-form a {
      color: #27AE60;
      text-decoration: none;
      font-weight: 500;
    }
    
    .toggle-form a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="logo">
      <h1>🌾 Mkulima-Bora</h1>
      <p>Connecting Farmers and Buyers</p>
    </div>
    
    <div id="error-message" class="error-message"></div>
    <div id="success-message" class="success-message"></div>
    
    <!-- Login Form -->
    <div id="login-form">
      <form id="loginForm">
        <div class="form-group">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" required>
        </div>
        
        <div class="form-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" required>
        </div>
        
        <button type="submit" class="btn btn-primary">Sign In</button>
      </form>
      
      <div class="divider">or</div>
      
      <button class="btn btn-google" id="google-signin-btn">
        <span>🔍</span>
        Sign in with Google
      </button>
      
      <div class="toggle-form">
        Don't have an account? <a href="#" id="show-register">Sign up</a>
      </div>
    </div>
    
    <!-- Register Form -->
    <div id="register-form" style="display: none;">
      <form id="registerForm">
        <div class="form-group">
          <label for="register-first-name">First Name</label>
          <input type="text" id="register-first-name" required>
        </div>
        
        <div class="form-group">
          <label for="register-last-name">Last Name</label>
          <input type="text" id="register-last-name" required>
        </div>
        
        <div class="form-group">
          <label for="register-email">Email</label>
          <input type="email" id="register-email" required>
        </div>
        
        <div class="form-group">
          <label for="register-password">Password</label>
          <input type="password" id="register-password" required minlength="6">
        </div>
        
        <div class="form-group">
          <label for="register-phone">Phone Number (Optional)</label>
          <input type="tel" id="register-phone" placeholder="+254 700 000 000">
        </div>
        
        <div class="form-group">
          <label>Role</label>
          <div style="display: flex; gap: 1rem;">
            <label style="display: flex; align-items: center;">
              <input type="checkbox" name="role" value="farmer" style="margin-right: 0.5rem;">
              Farmer
            </label>
            <label style="display: flex; align-items: center;">
              <input type="checkbox" name="role" value="buyer" style="margin-right: 0.5rem;">
              Buyer
            </label>
          </div>
        </div>
        
        <button type="submit" class="btn btn-primary">Sign Up</button>
      </form>
      
      <div class="divider">or</div>
      
      <button class="btn btn-google" id="google-signup-btn">
        <span>🔍</span>
        Sign up with Google
      </button>
      
      <div class="toggle-form">
        Already have an account? <a href="#" id="show-login">Sign in</a>
      </div>
    </div>
  </div>
  
  <!-- Firebase SDK -->
  <script type="module">
    // Import Firebase
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, 
             signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    
    // Firebase configuration
    const firebaseConfig = {
      apiKey: "AIzaSyDEX2PIAw5ZhSp84OiZgRK35WfGhTeT-0E",
      authDomain: "agriculture-43eaf.firebaseapp.com",
      projectId: "agriculture-43eaf",
      storageBucket: "agriculture-43eaf.firebasestorage.app",
      messagingSenderId: "340310533875",
      appId: "1:340310533875:web:54c8b2d5e28bf32d437986",
      measurementId: "G-9W1C0JWRYN"
    };
    
    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const googleProvider = new GoogleAuthProvider();
    
    // API base URL - environment-aware
    // Check for meta tag first (can be set in HTML for custom backend URL)
    const apiMetaTag = document.querySelector('meta[name="api-base-url"]');
    let API_BASE_URL;
    
    if (apiMetaTag && apiMetaTag.content) {
      // Use meta tag value if set
      API_BASE_URL = apiMetaTag.content;
    } else {
      // Auto-detect based on environment
      const hostname = window.location.hostname;
      const isProduction = hostname !== 'localhost' && 
                          hostname !== '127.0.0.1' &&
                          !hostname.startsWith('192.168.') &&
                          !hostname.startsWith('10.') &&
                          hostname !== '';
      
      if (isProduction) {
        // In production, use relative URL (same domain) or set your Vercel backend URL here
        // If backend is on same Vercel project, use '/api'
        // If backend is on different domain, uncomment and set:
        // API_BASE_URL = 'https://your-backend.vercel.app/api';
        API_BASE_URL = '/api';
      } else {
        // Development - use localhost
        API_BASE_URL = 'http://localhost:5000/api';
      }
    }
    
    console.log('API Base URL:', API_BASE_URL);
    
    // Authentication functions
    async function registerWithEmail(email, password, phoneNumber, role, firstName, lastName) {
      try {
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;
        
        const response = await fetch(`${API_BASE_URL}/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            firebase_uid: user.uid,
            email: user.email,
            phone_number: phoneNumber,
            role: role,
            first_name: firstName,
            last_name: lastName
          })
        });
        
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || 'Registration failed');
        
        const dashboardResponse = await getDashboardRoute(user.uid);
        return { success: true, user: data.user, dashboard: dashboardResponse.dashboard };
      } catch (error) {
        console.error('Registration error:', error);
        throw error;
      }
    }
    
    async function loginWithEmail(email, password) {
      try {
        const userCredential = await signInWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;
        const idToken = await user.getIdToken();
        
        const response = await fetch(`${API_BASE_URL}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id_token: idToken })
        });
        
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || 'Login failed');
        
        if (data.new_user) {
          return { 
            success: true, 
            newUser: true, 
            firebaseUid: data.firebase_uid, 
            email: data.email,
            firstName: data.first_name,
            lastName: data.last_name
          };
        }
        
        const dashboardResponse = await getDashboardRoute(user.uid);
        return { success: true, newUser: false, user: data.user, dashboard: dashboardResponse.dashboard };
      } catch (error) {
        console.error('Login error:', error);
        throw error;
      }
    }
    
    async function signInWithGoogle() {
      try {
        const result = await signInWithPopup(auth, googleProvider);
        const user = result.user;
        const idToken = await user.getIdToken();
        
        const response = await fetch(`${API_BASE_URL}/auth/google-signin`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id_token: idToken })
        });
        
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || 'Google sign-in failed');
        
        if (data.new_user) {
          return { success: true, newUser: true, firebaseUid: data.firebase_uid, email: data.email };
        }
        
        const dashboardResponse = await getDashboardRoute(user.uid);
        return { success: true, newUser: false, user: data.user, dashboard: dashboardResponse.dashboard };
      } catch (error) {
        console.error('Google sign-in error:', error);
        throw error;
      }
    }
    
    async function completeRegistration(firebaseUid, email, phoneNumber, role, firstName, lastName) {
      try {
        const response = await fetch(`${API_BASE_URL}/auth/complete-registration`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            firebase_uid: firebaseUid,
            email: email,
            phone_number: phoneNumber,
            role: role,
            first_name: firstName,
            last_name: lastName
          })
        });
        
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || 'Registration completion failed');
        
        const dashboardResponse = await getDashboardRoute(firebaseUid);
        return { success: true, user: data.user, dashboard: dashboardResponse.dashboard };
      } catch (error) {
        console.error('Complete registration error:', error);
        throw error;
      }
    }
    
    async function getDashboardRoute(firebaseUid) {
      try {
        const response = await fetch(`${API_BASE_URL}/auth/dashboard-route`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ firebase_uid: firebaseUid })
        });
        
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || 'Failed to get dashboard route');
        return data;
      } catch (error) {
        console.error('Get dashboard route error:', error);
        throw error;
      }
    }
    
    function redirectToDashboard(dashboard) {
      if (dashboard) {
        // Ensure dashboard path is absolute and doesn't have double frontend/ prefix
        let path = dashboard;
        if (!path.startsWith('/')) {
          path = '/' + path;
        }
        // Remove any double frontend/ prefix
        path = path.replace(/^\/frontend\/frontend\//, '/frontend/');
        // Remove single frontend/ prefix since Flask serves from frontend directory
        path = path.replace(/^\/frontend\//, '/');
        window.location.href = path;
      } else {
        window.location.href = '/index.html';
      }
    }
    
    function showRoleSelectionForm(firebaseUid, email, firstName = null, lastName = null) {
      const overlay = document.createElement('div');
      overlay.id = 'role-selection-overlay';
      overlay.style.cssText = `
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0, 0, 0, 0.5); display: flex; justify-content: center;
        align-items: center; z-index: 10000;
      `;
      
      const modal = document.createElement('div');
      modal.style.cssText = `
        background: white; padding: 2rem; border-radius: 12px;
        max-width: 500px; width: 90%; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      `;
      
      modal.innerHTML = `
        <h2 style="margin-bottom: 1rem; color: #27AE60;">Welcome to Mkulima-Bora!</h2>
        <p style="margin-bottom: 1.5rem; color: #6b7280;">
          Please select your role to get started. You can select multiple roles if applicable.
        </p>
        <form id="role-selection-form">
          ${!firstName || !lastName ? `
          <div style="margin-bottom: 1rem;">
            <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">
              First Name
            </label>
            <input type="text" name="first_name" id="first-name" value="${firstName || ''}" required
              style="width: 100%; padding: 0.75rem; border: 1px solid #e5e7eb; border-radius: 6px;">
          </div>
          <div style="margin-bottom: 1rem;">
            <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">
              Last Name
            </label>
            <input type="text" name="last_name" id="last-name" value="${lastName || ''}" required
              style="width: 100%; padding: 0.75rem; border: 1px solid #e5e7eb; border-radius: 6px;">
          </div>
          ` : ''}
          <div style="margin-bottom: 1rem;">
            <label style="display: flex; align-items: center; margin-bottom: 0.5rem; cursor: pointer;">
              <input type="checkbox" name="role" value="farmer" id="role-farmer" style="margin-right: 0.5rem;">
              <span style="font-weight: 500;">🌾 Farmer</span>
            </label>
            <p style="margin-left: 1.5rem; color: #6b7280; font-size: 0.9rem;">
              Sell your produce directly to buyers
            </p>
          </div>
          <div style="margin-bottom: 1.5rem;">
            <label style="display: flex; align-items: center; margin-bottom: 0.5rem; cursor: pointer;">
              <input type="checkbox" name="role" value="buyer" id="role-buyer" style="margin-right: 0.5rem;">
              <span style="font-weight: 500;">🛒 Buyer</span>
            </label>
            <p style="margin-left: 1.5rem; color: #6b7280; font-size: 0.9rem;">
              Purchase fresh produce from farmers
            </p>
          </div>
          <div style="margin-bottom: 1.5rem;">
            <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">
              Phone Number (Optional)
            </label>
            <input type="tel" name="phone_number" id="phone-number"
              placeholder="+254 700 000 000"
              style="width: 100%; padding: 0.75rem; border: 1px solid #e5e7eb; border-radius: 6px;">
          </div>
          <div style="display: flex; gap: 1rem; margin-top: 1.5rem;">
            <button type="submit" id="submit-role"
              style="flex: 1; padding: 0.75rem; background: #27AE60; color: white;
              border: none; border-radius: 6px; font-weight: 600; cursor: pointer;">
              Continue
            </button>
          </div>
        </form>
      `;
      
      overlay.appendChild(modal);
      document.body.appendChild(overlay);
      
      const form = modal.querySelector('#role-selection-form');
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const selectedRoles = Array.from(form.querySelectorAll('input[name="role"]:checked'))
          .map(checkbox => checkbox.value);
        if (selectedRoles.length === 0) {
          alert('Please select at least one role');
          return;
        }
        const phoneNumber = form.querySelector('#phone-number').value;
        const role = selectedRoles.join(',');
        const submitBtn = form.querySelector('#submit-role');
        submitBtn.disabled = true;
        submitBtn.textContent = 'Processing...';
        try {
          const firstNameInput = form.querySelector('#first-name');
          const lastNameInput = form.querySelector('#last-name');
          const finalFirstName = firstNameInput ? firstNameInput.value : null;
          const finalLastName = lastNameInput ? lastNameInput.value : null;
          const result = await completeRegistration(firebaseUid, email, phoneNumber, role, finalFirstName, finalLastName);
          localStorage.setItem('user', JSON.stringify(result.user));
          localStorage.setItem('userRole', role);
          document.body.removeChild(overlay);
          redirectToDashboard(result.dashboard);
        } catch (error) {
          console.error('Error completing registration:', error);
          alert('An error occurred. Please try again.');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Continue';
        }
      });
    }
    
    function handleColdStart(authResult) {
      if (authResult.newUser) {
        showRoleSelectionForm(authResult.firebaseUid, authResult.email, authResult.firstName, authResult.lastName);
      } else {
        if (authResult.dashboard) {
          localStorage.setItem('user', JSON.stringify(authResult.user));
          localStorage.setItem('userRole', authResult.user.role);
          redirectToDashboard(authResult.dashboard);
        }
      }
    }
    
    function showError(message) {
      const errorDiv = document.getElementById('error-message');
      errorDiv.textContent = message;
      errorDiv.style.display = 'block';
      setTimeout(() => { errorDiv.style.display = 'none'; }, 5000);
    }
    
    // Form toggle
    document.getElementById('show-register').addEventListener('click', (e) => {
      e.preventDefault();
      document.getElementById('login-form').style.display = 'none';
      document.getElementById('register-form').style.display = 'block';
    });
    
    document.getElementById('show-login').addEventListener('click', (e) => {
      e.preventDefault();
      document.getElementById('register-form').style.display = 'none';
      document.getElementById('login-form').style.display = 'block';
    });
    
    // Login form
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;
      
      try {
        const result = await loginWithEmail(email, password);
        if (result.newUser) {
          showRoleSelectionForm(result.firebaseUid, result.email);
        } else {
          redirectToDashboard(result.dashboard);
        }
      } catch (error) {
        showError(error.message);
      }
    });
    
    // Register form
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const firstName = document.getElementById('register-first-name').value;
      const lastName = document.getElementById('register-last-name').value;
      const email = document.getElementById('register-email').value;
      const password = document.getElementById('register-password').value;
      const phone = document.getElementById('register-phone').value;
      const roles = Array.from(document.querySelectorAll('input[name="role"]:checked'))
        .map(cb => cb.value);
      
      if (roles.length === 0) {
        showError('Please select at least one role');
        return;
      }
      
      try {
        const result = await registerWithEmail(email, password, phone, roles.join(','), firstName, lastName);
        window.location.href = result.dashboard;
      } catch (error) {
        showError(error.message);
      }
    });
    
    // Google sign-in buttons
    document.getElementById('google-signin-btn').addEventListener('click', async () => {
      try {
        const result = await signInWithGoogle();
        handleColdStart(result);
      } catch (error) {
        showError(error.message);
      }
    });
    
    document.getElementById('google-signup-btn').addEventListener('click', async () => {
      try {
        const result = await signInWithGoogle();
        handleColdStart(result);
      } catch (error) {
        showError(error.message);
      }
    });
  </script>
</body>
</html>
