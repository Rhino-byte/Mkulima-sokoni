<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="api-base-url" content="" id="api-base-url-meta">
  <title>Sign In | Soko Safi</title>
  <meta name="application-name" content="Soko Safi" />
  <link rel="icon" type="image/png" href="assets/img/sokosafi_logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --forest:    #1B4332;
      --leaf:      #40916C;
      --lime:      #74C69D;
      --gold:      #E9C46A;
      --amber:     #F4A261;
      --cream:     #FAF6EF;
      --ink:       #1A1A18;
      --muted:     #6B705C;
      --border:    #DDD8CE;
      --shadow-sm: 0 2px 12px rgba(27,67,50,.08);
      --shadow-md: 0 8px 32px rgba(27,67,50,.13);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--forest);
      color: var(--ink);
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      position: relative;
      overflow-x: hidden;
    }
    body::before {
      content: ''; position: absolute; inset: 0; pointer-events: none;
      background: radial-gradient(ellipse 60% 80% at 20% 100%, rgba(116,198,157,.12) 0%, transparent 60%),
                  radial-gradient(ellipse 50% 70% at 80% 20%, rgba(233,196,106,.08) 0%, transparent 55%);
    }
    body::after {
      content: ''; position: absolute; inset: 0; pointer-events: none;
      background-image: radial-gradient(rgba(255,255,255,.04) 1px, transparent 1px);
      background-size: 28px 28px;
    }
    a { color: inherit; text-decoration: none; }

    .auth-wrapper { position: relative; z-index: 1; width: 100%; max-width: 480px; }

    .auth-logo { text-align: center; margin-bottom: 28px; }
    .auth-logo-mark {
      width: 80px; height: 80px; border-radius: 20px; overflow: hidden;
      display: inline-grid; place-items: center; background: #fff;
      box-shadow: 0 8px 32px rgba(116,198,157,.45);
      margin-bottom: 14px;
    }
    .auth-logo-mark img { width: 100%; height: 100%; object-fit: contain; display: block; }
    .auth-logo-name { font-family: 'Playfair Display', serif; font-size: 1.6rem; font-weight: 700; color: #fff; }
    .auth-logo-tag { font-size: .82rem; color: var(--lime); font-weight: 300; }

    .auth-card {
      background: #fff; border-radius: 20px; padding: 32px;
      box-shadow: 0 20px 60px rgba(0,0,0,.2);
      border: 1px solid rgba(255,255,255,.1);
    }
    .auth-card h2 {
      font-family: 'Playfair Display', serif; font-size: 1.35rem; font-weight: 700;
      color: var(--forest); margin-bottom: 4px; text-align: center;
    }
    .auth-card .subtitle { font-size: .85rem; color: var(--muted); text-align: center; margin-bottom: 22px; }

    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: .82rem; font-weight: 600; color: var(--ink); margin-bottom: 5px; }
    .form-group input, .form-group select {
      width: 100%; padding: 11px 14px; border: 1.5px solid var(--border); border-radius: 10px;
      font-size: .9rem; font-family: 'DM Sans', sans-serif; color: var(--ink);
      background: var(--cream); outline: none; transition: all .2s;
    }
    .form-group input:focus, .form-group select:focus {
      border-color: var(--leaf); background: #fff;
      box-shadow: 0 0 0 3px rgba(64,145,108,.12);
    }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    /* Role selector tabs */
    .role-selector { display: flex; gap: 8px; margin-bottom: 18px; }
    .role-tab {
      flex: 1; padding: 12px 8px; border-radius: 12px;
      border: 2px solid var(--border); background: var(--cream);
      cursor: pointer; text-align: center; transition: all .2s;
    }
    .role-tab:hover { border-color: var(--lime); }
    .role-tab.active { border-color: var(--forest); background: var(--forest); }
    .role-tab.active .role-tab-icon { background: rgba(255,255,255,.2); }
    .role-tab.active .role-tab-label { color: #fff; }
    .role-tab.active .role-tab-desc { color: rgba(255,255,255,.7); }
    .role-tab-icon { width: 36px; height: 36px; border-radius: 9px; display: inline-grid; place-items: center; font-size: 18px; background: rgba(27,67,50,.08); margin-bottom: 6px; }
    .role-tab-label { font-size: .82rem; font-weight: 700; color: var(--ink); display: block; }
    .role-tab-desc { font-size: .68rem; color: var(--muted); display: block; margin-top: 2px; }
    .role-tab input[type="radio"] { display: none; }

    .btn {
      width: 100%; padding: 12px; border-radius: 10px; border: none;
      font-size: .92rem; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif;
      transition: all .2s; margin-bottom: 10px;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--forest), var(--leaf));
      color: #fff; box-shadow: 0 4px 14px rgba(27,67,50,.25);
    }
    .btn-primary:hover { opacity: .92; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(27,67,50,.3); }
    .btn-google {
      background: #fff; color: var(--ink); border: 1.5px solid var(--border);
      display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .btn-google:hover { background: var(--cream); border-color: var(--leaf); }
    .btn-google svg { flex-shrink: 0; }

    .divider { text-align: center; margin: 16px 0; color: var(--muted); font-size: .82rem; position: relative; }
    .divider::before, .divider::after {
      content: ''; position: absolute; top: 50%; width: 42%; height: 1px; background: var(--border);
    }
    .divider::before { left: 0; }
    .divider::after { right: 0; }

    .toggle-form { text-align: center; margin-top: 18px; font-size: .85rem; color: var(--muted); }
    .toggle-form a { color: var(--leaf); font-weight: 600; }
    .toggle-form a:hover { color: var(--forest); text-decoration: underline; }

    .error-message {
      background: #fef2f2; color: #991b1b; padding: 10px 14px; border-radius: 10px;
      margin-bottom: 14px; font-size: .85rem; display: none; border: 1px solid #fecaca;
    }
    .success-message {
      background: #ecfdf5; color: #065f46; padding: 10px 14px; border-radius: 10px;
      margin-bottom: 14px; font-size: .85rem; display: none; border: 1px solid #a7f3d0;
    }

    .back-link {
      display: block; text-align: center; margin-top: 20px; font-size: .82rem; color: rgba(255,255,255,.5);
    }
    .back-link a { color: var(--lime); font-weight: 500; }
    .back-link a:hover { text-decoration: underline; color: #fff; }

    @media (max-width: 520px) {
      body { padding: 1rem; }
      .auth-card { padding: 24px 20px; }
      .form-row { grid-template-columns: 1fr; }
      .role-selector { flex-direction: column; }
      .role-tab { display: flex; align-items: center; gap: 12px; text-align: left; padding: 10px 14px; }
      .role-tab-icon { margin-bottom: 0; }
    }
  </style>
</head>
<body>
  <div class="auth-wrapper">

    <div class="auth-logo">
      <div class="auth-logo-mark">
        <img src="assets/img/sokosafi_logo.png" alt="Soko Safi logo" />
      </div>
      <div class="auth-logo-name">Soko Safi</div>
      <div class="auth-logo-tag">From farm to market, fairly.</div>
    </div>

    <div class="auth-card">
      <div id="error-message" class="error-message"></div>
      <div id="success-message" class="success-message"></div>

      <!-- ── LOGIN FORM ── -->
      <div id="login-form">
        <h2>Welcome Back</h2>
        <p class="subtitle">Sign in to your Soko Safi account</p>
        <form id="loginForm">
          <div class="form-group">
            <label for="login-email">Email</label>
            <input type="email" id="login-email" placeholder="you@example.com" required />
          </div>
          <div class="form-group">
            <label for="login-password">Password</label>
            <input type="password" id="login-password" placeholder="Enter your password" required />
          </div>
          <button type="submit" class="btn btn-primary">Sign In</button>
        </form>
        <div class="divider">or</div>
        <button class="btn btn-google" id="google-signin-btn">
          <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59a14.5 14.5 0 010-9.18l-7.98-6.19a24.01 24.01 0 000 21.56l7.98-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
          Sign in with Google
        </button>
        <div class="toggle-form">
          Don't have an account? <a href="#" id="show-register">Sign up</a>
        </div>
      </div>

      <!-- ── REGISTER FORM ── -->
      <div id="register-form" style="display: none;">
        <h2>Create Account</h2>
        <p class="subtitle">Join Soko Safi — select your role</p>

        <div class="role-selector" id="role-selector">
          <label class="role-tab active" data-role="farmer">
            <input type="radio" name="role" value="farmer" checked />
            <span class="role-tab-icon">🌾</span>
            <span>
              <span class="role-tab-label">Farmer</span>
              <span class="role-tab-desc">Sell your produce</span>
            </span>
          </label>
          <label class="role-tab" data-role="buyer">
            <input type="radio" name="role" value="buyer" />
            <span class="role-tab-icon">🛒</span>
            <span>
              <span class="role-tab-label">Buyer</span>
              <span class="role-tab-desc">Purchase produce</span>
            </span>
          </label>
          <label class="role-tab" data-role="agro-dealer">
            <input type="radio" name="role" value="agro-dealer" />
            <span class="role-tab-icon">🏪</span>
            <span>
              <span class="role-tab-label">Agro-Dealer</span>
              <span class="role-tab-desc">Supply farm inputs</span>
            </span>
          </label>
        </div>

        <form id="registerForm">
          <div class="form-row">
            <div class="form-group">
              <label for="register-first-name">First Name</label>
              <input type="text" id="register-first-name" placeholder="John" required />
            </div>
            <div class="form-group">
              <label for="register-last-name">Last Name</label>
              <input type="text" id="register-last-name" placeholder="Mwangi" required />
            </div>
          </div>
          <div class="form-group">
            <label for="register-email">Email</label>
            <input type="email" id="register-email" placeholder="you@example.com" required />
          </div>
          <div class="form-group">
            <label for="register-password">Password</label>
            <input type="password" id="register-password" placeholder="Min 6 characters" required minlength="6" />
          </div>
          <div class="form-group">
            <label for="register-phone">Phone Number (Optional)</label>
            <input type="tel" id="register-phone" placeholder="+254 700 000 000" />
          </div>
          <button type="submit" class="btn btn-primary">Create Account</button>
        </form>
        <div class="divider">or</div>
        <button class="btn btn-google" id="google-signup-btn">
          <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59a14.5 14.5 0 010-9.18l-7.98-6.19a24.01 24.01 0 000 21.56l7.98-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
          Sign up with Google
        </button>
        <div class="toggle-form">
          Already have an account? <a href="#" id="show-login">Sign in</a>
        </div>
      </div>
    </div>

    <div class="back-link">
      <a href="index.html">← Back to Soko Safi Home</a>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword,
             signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDEX2PIAw5ZhSp84OiZgRK35WfGhTeT-0E",
      authDomain: "agriculture-43eaf.firebaseapp.com",
      projectId: "agriculture-43eaf",
      storageBucket: "agriculture-43eaf.firebasestorage.app",
      messagingSenderId: "340310533875",
      appId: "1:340310533875:web:54c8b2d5e28bf32d437986",
      measurementId: "G-9W1C0JWRYN"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const googleProvider = new GoogleAuthProvider();

    const apiMetaTag = document.querySelector('meta[name="api-base-url"]');
    let API_BASE_URL;
    if (apiMetaTag && apiMetaTag.content) {
      API_BASE_URL = apiMetaTag.content;
    } else {
      const hostname = window.location.hostname;
      const isProduction = hostname !== 'localhost' &&
                          hostname !== '127.0.0.1' &&
                          !hostname.startsWith('192.168.') &&
                          !hostname.startsWith('10.') &&
                          hostname !== '';
      API_BASE_URL = isProduction ? '/api' : 'http://localhost:5000/api';
    }

    /* ── Role selector tabs ── */
    document.querySelectorAll('.role-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.role-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        tab.querySelector('input[type="radio"]').checked = true;
      });
    });

    /* ── Auth functions ── */
    async function registerWithEmail(email, password, phoneNumber, role, firstName, lastName) {
      try {
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;
        const response = await fetch(`${API_BASE_URL}/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            firebase_uid: user.uid, email: user.email,
            phone_number: phoneNumber, role: role,
            first_name: firstName, last_name: lastName
          })
        });
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || 'Registration failed');
        const dashboardResponse = await getDashboardRoute(user.uid);
        return { success: true, user: data.user, dashboard: dashboardResponse.dashboard };
      } catch (error) { console.error('Registration error:', error); throw error; }
    }

    async function loginWithEmail(email, password) {
      try {
        const userCredential = await signInWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;
        const idToken = await user.getIdToken();
        const response = await fetch(`${API_BASE_URL}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id_token: idToken })
        });
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || 'Login failed');
        if (data.new_user) {
          return { success: true, newUser: true, firebaseUid: data.firebase_uid,
                   email: data.email, firstName: data.first_name, lastName: data.last_name };
        }
        const dashboardResponse = await getDashboardRoute(user.uid);
        return { success: true, newUser: false, user: data.user, dashboard: dashboardResponse.dashboard };
      } catch (error) { console.error('Login error:', error); throw error; }
    }

    async function signInWithGoogle() {
      try {
        const result = await signInWithPopup(auth, googleProvider);
        const user = result.user;
        const idToken = await user.getIdToken();
        const response = await fetch(`${API_BASE_URL}/auth/google-signin`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id_token: idToken })
        });
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || 'Google sign-in failed');
        if (data.new_user) {
          return { success: true, newUser: true, firebaseUid: data.firebase_uid, email: data.email };
        }
        const dashboardResponse = await getDashboardRoute(user.uid);
        return { success: true, newUser: false, user: data.user, dashboard: dashboardResponse.dashboard };
      } catch (error) { console.error('Google sign-in error:', error); throw error; }
    }

    async function completeRegistration(firebaseUid, email, phoneNumber, role, firstName, lastName) {
      try {
        const response = await fetch(`${API_BASE_URL}/auth/complete-registration`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            firebase_uid: firebaseUid, email: email,
            phone_number: phoneNumber, role: role,
            first_name: firstName, last_name: lastName
          })
        });
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || 'Registration completion failed');
        const dashboardResponse = await getDashboardRoute(firebaseUid);
        return { success: true, user: data.user, dashboard: dashboardResponse.dashboard };
      } catch (error) { console.error('Complete registration error:', error); throw error; }
    }

    async function getDashboardRoute(firebaseUid) {
      try {
        const response = await fetch(`${API_BASE_URL}/auth/dashboard-route`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ firebase_uid: firebaseUid })
        });
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || 'Failed to get dashboard route');
        return data;
      } catch (error) { console.error('Get dashboard route error:', error); throw error; }
    }

    function redirectToDashboard(dashboard) {
      if (dashboard) {
        let path = dashboard;
        if (!path.startsWith('/')) path = '/' + path;
        path = path.replace(/^\/frontend\/frontend\//, '/frontend/');
        path = path.replace(/^\/frontend\//, '/');
        window.location.href = path;
      } else {
        window.location.href = '/index.html';
      }
    }

    function showRoleSelectionForm(firebaseUid, email, firstName = null, lastName = null) {
      const overlay = document.createElement('div');
      overlay.id = 'role-selection-overlay';
      overlay.style.cssText = `
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(27,67,50,.7); backdrop-filter: blur(8px);
        display: flex; justify-content: center; align-items: center;
        z-index: 10000; padding: 1rem;
      `;
      const modal = document.createElement('div');
      modal.style.cssText = `
        background: #fff; padding: 2rem; border-radius: 20px;
        max-width: 500px; width: 100%; box-shadow: 0 20px 60px rgba(0,0,0,.3);
      `;
      modal.innerHTML = `
        <div style="text-align:center;margin-bottom:20px;">
          <div style="width:60px;height:60px;border-radius:14px;overflow:hidden;display:inline-grid;place-items:center;background:#fff;box-shadow:0 4px 16px rgba(116,198,157,.4);margin-bottom:12px;">
            <img src="assets/img/sokosafi_logo.png" alt="" style="width:100%;height:100%;object-fit:contain;" />
          </div>
          <h2 style="font-family:'Playfair Display',serif;color:#1B4332;font-size:1.25rem;">Welcome to Soko Safi!</h2>
          <p style="color:#6B705C;font-size:.88rem;">Select your role to get started</p>
        </div>
        <form id="role-selection-form">
          ${!firstName || !lastName ? `
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;">
            <div>
              <label style="display:block;font-size:.82rem;font-weight:600;margin-bottom:4px;">First Name</label>
              <input type="text" name="first_name" id="first-name" value="${firstName || ''}" required
                style="width:100%;padding:10px 12px;border:1.5px solid #DDD8CE;border-radius:10px;font-size:.88rem;font-family:'DM Sans',sans-serif;background:#FAF6EF;outline:none;">
            </div>
            <div>
              <label style="display:block;font-size:.82rem;font-weight:600;margin-bottom:4px;">Last Name</label>
              <input type="text" name="last_name" id="last-name" value="${lastName || ''}" required
                style="width:100%;padding:10px 12px;border:1.5px solid #DDD8CE;border-radius:10px;font-size:.88rem;font-family:'DM Sans',sans-serif;background:#FAF6EF;outline:none;">
            </div>
          </div>` : ''}
          <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px;">
            <label style="display:flex;align-items:center;gap:10px;padding:12px 14px;border:2px solid #DDD8CE;border-radius:12px;cursor:pointer;transition:all .2s;" class="role-opt">
              <input type="radio" name="role" value="farmer" style="accent-color:#1B4332;" checked />
              <span style="font-size:18px;">🌾</span>
              <span><strong style="font-size:.88rem;">Farmer</strong><br><span style="font-size:.78rem;color:#6B705C;">Sell your produce directly</span></span>
            </label>
            <label style="display:flex;align-items:center;gap:10px;padding:12px 14px;border:2px solid #DDD8CE;border-radius:12px;cursor:pointer;transition:all .2s;" class="role-opt">
              <input type="radio" name="role" value="buyer" style="accent-color:#1B4332;" />
              <span style="font-size:18px;">🛒</span>
              <span><strong style="font-size:.88rem;">Buyer</strong><br><span style="font-size:.78rem;color:#6B705C;">Purchase fresh produce</span></span>
            </label>
            <label style="display:flex;align-items:center;gap:10px;padding:12px 14px;border:2px solid #DDD8CE;border-radius:12px;cursor:pointer;transition:all .2s;" class="role-opt">
              <input type="radio" name="role" value="agro-dealer" style="accent-color:#1B4332;" />
              <span style="font-size:18px;">🏪</span>
              <span><strong style="font-size:.88rem;">Agro-Dealer</strong><br><span style="font-size:.78rem;color:#6B705C;">Supply farm inputs</span></span>
            </label>
          </div>
          <div style="margin-bottom:16px;">
            <label style="display:block;font-size:.82rem;font-weight:600;margin-bottom:4px;">Phone Number (Optional)</label>
            <input type="tel" name="phone_number" id="phone-number" placeholder="+254 700 000 000"
              style="width:100%;padding:10px 12px;border:1.5px solid #DDD8CE;border-radius:10px;font-size:.88rem;font-family:'DM Sans',sans-serif;background:#FAF6EF;outline:none;">
          </div>
          <button type="submit" id="submit-role"
            style="width:100%;padding:12px;background:linear-gradient(135deg,#1B4332,#40916C);color:#fff;border:none;border-radius:10px;font-size:.9rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;box-shadow:0 4px 14px rgba(27,67,50,.25);">
            Continue
          </button>
        </form>
      `;
      overlay.appendChild(modal);
      document.body.appendChild(overlay);

      const form = modal.querySelector('#role-selection-form');
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const selectedRole = form.querySelector('input[name="role"]:checked')?.value;
        if (!selectedRole) { alert('Please select a role'); return; }
        const phoneNumber = form.querySelector('#phone-number').value;
        const submitBtn = form.querySelector('#submit-role');
        submitBtn.disabled = true;
        submitBtn.textContent = 'Processing...';
        try {
          const firstNameInput = form.querySelector('#first-name');
          const lastNameInput = form.querySelector('#last-name');
          const finalFirstName = firstNameInput ? firstNameInput.value : firstName;
          const finalLastName = lastNameInput ? lastNameInput.value : lastName;
          const result = await completeRegistration(firebaseUid, email, phoneNumber, selectedRole, finalFirstName, finalLastName);
          localStorage.setItem('user', JSON.stringify(result.user));
          localStorage.setItem('userRole', selectedRole);
          document.body.removeChild(overlay);
          redirectToDashboard(result.dashboard);
        } catch (error) {
          console.error('Error completing registration:', error);
          alert('An error occurred. Please try again.');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Continue';
        }
      });
    }

    function handleColdStart(authResult) {
      if (authResult.newUser) {
        showRoleSelectionForm(authResult.firebaseUid, authResult.email, authResult.firstName, authResult.lastName);
      } else {
        if (authResult.dashboard) {
          localStorage.setItem('user', JSON.stringify(authResult.user));
          localStorage.setItem('userRole', authResult.user.role);
          redirectToDashboard(authResult.dashboard);
        }
      }
    }

    function showError(message) {
      const errorDiv = document.getElementById('error-message');
      errorDiv.textContent = message;
      errorDiv.style.display = 'block';
      setTimeout(() => { errorDiv.style.display = 'none'; }, 5000);
    }

    /* ── Form toggles ── */
    document.getElementById('show-register').addEventListener('click', (e) => {
      e.preventDefault();
      document.getElementById('login-form').style.display = 'none';
      document.getElementById('register-form').style.display = 'block';
    });
    document.getElementById('show-login').addEventListener('click', (e) => {
      e.preventDefault();
      document.getElementById('register-form').style.display = 'none';
      document.getElementById('login-form').style.display = 'block';
    });

    /* ── Login ── */
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;
      try {
        const result = await loginWithEmail(email, password);
        if (result.newUser) {
          showRoleSelectionForm(result.firebaseUid, result.email);
        } else {
          redirectToDashboard(result.dashboard);
        }
      } catch (error) { showError(error.message); }
    });

    /* ── Register ── */
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const firstName = document.getElementById('register-first-name').value;
      const lastName = document.getElementById('register-last-name').value;
      const email = document.getElementById('register-email').value;
      const password = document.getElementById('register-password').value;
      const phone = document.getElementById('register-phone').value;
      const role = document.querySelector('#role-selector input[name="role"]:checked')?.value || 'farmer';
      try {
        const result = await registerWithEmail(email, password, phone, role, firstName, lastName);
        window.location.href = result.dashboard;
      } catch (error) { showError(error.message); }
    });

    /* ── Google ── */
    document.getElementById('google-signin-btn').addEventListener('click', async () => {
      try { const result = await signInWithGoogle(); handleColdStart(result); }
      catch (error) { showError(error.message); }
    });
    document.getElementById('google-signup-btn').addEventListener('click', async () => {
      try { const result = await signInWithGoogle(); handleColdStart(result); }
      catch (error) { showError(error.message); }
    });
  </script>
</body>
</html>
